version: "3.9"


services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: RestaurantDB
    environment:
      SA_PASSWORD: "MiguelJv@2026"
      ACCEPT_EULA: "Y"
    ports:
      - "1533:1433"
    volumes:
      - sql_data:/var/opt/mssql
  api:
    build: .
    container_name: restaurant-api
    depends_on:
      - db
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: "mssql+pyodbc://sa:MiguelJv%402026@host.docker.internal:1533/RestaurantDB?driver=ODBC+Driver+17+for+SQL+Server&TrustServerCertificate=yes"
      SECRET_KEY: "supersecretkey123"
      ALGORITHM: "HS256"
      ACCESS_TOKEN_EXPIRE_MINUTES: "60"

volumes:
  sql_data:

